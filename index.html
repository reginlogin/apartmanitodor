<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apartmani Todor</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div class="top-controls">
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('hr')">HR</button>
    <button onclick="setLang('de')">DE</button>
    <button onclick="toggleTheme()" id="themeBtn">🌙</button>
  </div>
  <div class="content">
    <h1>APARTMANI TODOR</h1>
    <p id="subtitle"></p>
  </div>
</header>

<nav>
  <a href="#apartments"></a>
  <a href="#gallery"></a>
  <a href="#location"></a>
  <a href="#contact"></a>
</nav>

<section id="apartments">
  <h2 id="apartmentsTitle" class="section-title"></h2>
  <div class="apartments" id="apartmentContainer"></div>
</section>

<section id="gallery">
  <h2 id="galleryTitle" class="section-title"></h2>

  <div class="gallery-wrapper">
    <button class="gallery-nav prev" onclick="changeGallery(-1)">❮</button>

    <div class="gallery-viewport">
      <div class="gallery-track" id="galleryTrack">
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1560185007-cde436f6a4d0" onclick="openLightbox(this.src)"></div>
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1505691938895-1758d7feb511" onclick="openLightbox(this.src)"></div>
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2" onclick="openLightbox(this.src)"></div>
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1507089947368-19c1da9775ae" onclick="openLightbox(this.src)"></div>
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1494526585095-c41746248156" onclick="openLightbox(this.src)"></div>
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1502673530728-f79b4cab31b1" onclick="openLightbox(this.src)"></div>
      </div>
    </div>

    <button class="gallery-nav next" onclick="changeGallery(1)">❯</button>
  </div>

  <div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img">
  </div>
</section>

<section id="location">
  <h2 id="locationTitle" class="section-title"></h2>
  <iframe src="https://www.google.com/maps?q=Okrug+Gornji&output=embed"></iframe>
</section>

<footer id="contact">
  <div class="footer-content">
    <h2 id="contactTitle"></h2>
    <div class="contact">
      <a id="emailBtn" href="mailto:vlado.todorovic.split@gmail.com"></a>
      <a id="callBtn" href="tel:+00395997340863"></a>
    </div>
    <p id="footerText"></p>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
