<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apartmani Todor</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div class="top-controls">
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('hr')">HR</button>
    <button onclick="setLang('de')">DE</button>
    <button onclick="toggleTheme()" id="themeBtn">🌙</button>
  </div>
  <div class="content">
    <h1>APARTMANI TODOR</h1>
    <p id="subtitle"></p>
  </div>
</header>

<nav>
  <a href="#apartments"></a>
  <a href="#gallery"></a>
  <a href="#location"></a>
  <a href="#contact"></a>
</nav>

<section id="apartments">
  <h2 id="apartmentsTitle" class="section-title"></h2>
  <div class="apartments" id="apartmentContainer"></div>
</section>

<section id="gallery">
  <h2 id="galleryTitle" class="section-title"></h2>

  <div class="gallery-wrapper">
    <button class="gallery-nav prev" onclick="changeGallery(-1)">❮</button>

    <div class="gallery-viewport">
      <div class="gallery-track" id="galleryTrack">
        <div class="gallery-item"><img src="assets/img1.jpg" onclick="openLightbox(this.src)"></div>
        <div class="gallery-item"><img src="assets/img2.jpg" onclick="openLightbox(this.src)"></div>
        <div class="gallery-item"><img src="assets/img3.jpg" onclick="openLightbox(this.src)"></div>
        <div class="gallery-item"><img src="assets/terasa1.jpg" onclick="openLightbox(this.src)"></div>
        <div class="gallery-item"><img src="assets/terasa2.jpg" onclick="openLightbox(this.src)"></div>
        <div class="gallery-item"><img src="https://images.unsplash.com/photo-1502673530728-f79b4cab31b1" onclick="openLightbox(this.src)"></div>
      </div>
    </div>

    <button class="gallery-nav next" onclick="changeGallery(1)">❯</button>
  </div>

  <div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img">
  </div>
</section>

<section id="location">
  <h2 id="locationTitle" class="section-title"></h2>
  <div class="card location-card">
  <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2894.785971294611!2d16.2678901!3d43.4859368!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x13356971a6f6337f%3A0x25a163022d58faa2!2sUl.%20Franje%20Krste%20Frankopana%2014%2C%2021223%2C%20Okrug%20Gornji!5e0!3m2!1sen!2shr!4v1772460448141!5m2!1sen!2shr" loading="lazy"></iframe>
  </div>
</section>

<footer id="contact">
  <div class="footer-content">
  <h2 id="contactTitle" class="section-title"></h2>
  <div class="card contact-card">
  <p>
    📧 
    <a href="mailto:vlado.todorovic.split@gmail.com">
    vlado.todorovic.split@gmail.com
    </a>
  </p>
  <p>
    📞 
    <a href="tel:+00395997340863">
    0039 599 734 0863
    </a>
  </p>
  </div>
  <p id="footerText"></p>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
